// ===================== COMPONENTS =====================

function Stars({ r }) {
  return <span className="stars">⭐ {r.toFixed(1)}</span>;
}

function AvatarCircle({ tutor, size=56 }) {
  return (
    <div className="avatar-circle" style={{
      width: size, height: size, background: tutor.ab, fontSize: size * 0.32, flexShrink: 0,
    }}>{tutor.av}</div>
  );
}

function TagChip({ label, color }) {
  return <span className="tag" style={color ? {background:color.bg,color:color.text} : {}}>{label}</span>;
}

// ---- HEADER ----
function Header({ lang, setLang, t, goHome }) {
  return (
    <div style={{
      position:'sticky', top:0, zIndex:50,
      background:'rgba(255,255,255,0.92)', backdropFilter:'blur(12px)',
      borderBottom:'1px solid #fecdd3',
      padding:'12px 16px', display:'flex', alignItems:'center', justifyContent:'space-between',
    }}>
      <button onClick={goHome} style={{background:'none',border:'none',cursor:'pointer'}}>
        <span style={{
          fontSize:17, fontWeight:800,
          background:'linear-gradient(135deg,#f43f5e,#ec4899)',
          WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
        }}>💕 {t.appName}</span>
      </button>
      <button
        onClick={() => setLang(lang==='ja'?'ko':'ja')}
        style={{
          fontSize:12, background:'#fff5f7', border:'1.5px solid #fda4af',
          borderRadius:20, padding:'5px 12px', fontWeight:600, color:'#f43f5e', cursor:'pointer',
        }}
      >{lang==='ja'?'한국어':'日本語'}</button>
    </div>
  );
}

// ---- BOTTOM NAV ----
function BottomNav({ t, screen, setScreen }) {
  const items = [
    { key:'home', icon:'🏠', label: t.nav.home },

    { key:'tutorReg', icon:'👨', label: t.nav.tutorReg },
  ];
  return (
    <div style={{
      position:'sticky', bottom:0, zIndex:50,

      borderTop:'1px solid #fecdd3',
      display:'flex', justifyContent:'space-around', padding:'10px 0 16px',
    }}>
      {items.map(item => (
        <button key={item.key} onClick={()=>setScreen(item.key)} style={{
          background:'none', border:'none', cursor:'pointer',

          color: screen===item.key ? '#f43f5e' : '#9ca3af',

// ---- HOME SCREEN ----
function HomeScreen({ lang, t, setScreen, setTutor }) {
  const [sort, setSort] = useState('popular');
  const [showSort, setShowSort] = useState(false);
  const [activeFilters, setActiveFilters] = useState([]);
  const fkeys = Object.keys(t.filters);

  const toggleFilter = f => setActiveFilters(p => p.includes(f)?p.filter(x=>x!==f):[...p,f]);

  return (
    <div style={{paddingBottom:8}}>
      {/* Hero */}
      <div style={{background:'linear-gradient(135deg,#fff5f7,#fce7f3,#fdf4ff)',padding:'20px 16px 28px'}}>
        <p style={{fontSize:12,color:'#9ca3af',marginBottom:4}}>✨ {lang==='ja'?'毎週500人以上が学習中':'매주 500명 이상이 학습 중'}</p>
        <h1 style={{fontSize:22,fontWeight:800,color:'#1f2937',lineHeight:1.3,marginBottom:14}}>{t.tagline}</h1>
        <div style={{background:'#fff',borderRadius:16,border:'1px solid #fecdd3',display:'flex',alignItems:'center',padding:'11px 14px',gap:8,boxShadow:'0 2px 8px rgba(244,63,94,0.07)'}}>
          <span style={{color:'#9ca3af'}}>🔍</span>
          <input placeholder={t.searchPh} style={{flex:1,border:'none',outline:'none',fontSize:13,color:'#374151',background:'transparent'}} />
        </div>
      </div>

      {/* Sort + Filter */}
      <div style={{padding:'14px 16px 0'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
          <div style={{position:'relative'}}>
            <button onClick={()=>setShowSort(!showSort)} style={{
              display:'flex',alignItems:'center',gap:5,background:'#fff',
              border:'1.5px solid #fecdd3',borderRadius:14,padding:'7px 12px',
              fontSize:12,color:'#374151',cursor:'pointer',fontWeight:600,
            }}>
              <span>↕️</span><span>{t.sortOpts[sort]}</span><span style={{color:'#9ca3af'}}>▾</span>
            </button>
            {showSort && (
              <div className="sort-dropdown">
                {Object.keys(t.sortOpts).map(k=>(
                  <button key={k} className={`sort-option ${sort===k?'selected':''}`}
                    onClick={()=>{setSort(k);setShowSort(false);}}>
                    {t.sortOpts[k]}
                  </button>
                ))}
              </div>
            )}
          </div>
          <span style={{fontSize:12,color:'#9ca3af'}}>{tutors.length}{t.tutors}</span>
        </div>

        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}}>
          {fkeys.map(f=>(
            <button key={f} className={`filter-chip ${activeFilters.includes(f)?'active':''}`}
              onClick={()=>toggleFilter(f)}>{t.filters[f]}</button>
          ))}
        </div>

        {tutors.map(tutor=>(
          <TutorCard key={tutor.id} tutor={tutor} lang={lang} t={t}
            onView={()=>{setTutor(tutor);setScreen('detail');}} />
        ))}
      </div>
    </div>
  );
}

// ---- BOOKING SCREEN ----
function BookingScreen({ lang, t, tutor, setScreen }) {
  const [ltype, setLtype] = useState('online');
  const [selDate, setSelDate] = useState(null);
  const [selTime, setSelTime] = useState(null);
  const [selCourse, setSelCourse] = useState(null);

  const times = ['10:00','11:00','12:00','14:00','15:00','16:00','18:00','19:00','20:00'];
  const today = new Date(2026,3,9);
  const dates = Array.from({length:14},(_,i)=>{const d=new Date(today);d.setDate(today.getDate()+i+1);return d;});
  const dayNamesJa = ['日','月','火','水','木','金','土'];
  const dayNamesKo = ['일','월','화','수','목','금','토'];
  const dayNames = lang==='ja' ? dayNamesJa : dayNamesKo;

  const oCourses = lang==='ja'
    ? [{k:'20m',l:'20分コース',p:'¥2,500'},{k:'30m',l:'30分コース',p:'¥3,500'},{k:'60m',l:'60分コース',p:'¥6,000'}]
    : [{k:'20m',l:'20분 코스',p:'¥2,500'},{k:'30m',l:'30분 코스',p:'¥3,500'},{k:'60m',l:'60분 코스',p:'¥6,000'}];
  const fCourses = lang==='ja'
    ? [{k:'o20m',l:'20分コース',p:'¥4,500'},{k:'o30m',l:'30分コース',p:'¥6,000'},{k:'o60m',l:'60分コース',p:'¥11,000'}]
    : [{k:'o20m',l:'20분 코스',p:'¥4,500'},{k:'o30m',l:'30분 코스',p:'¥6,000'},{k:'o60m',l:'60분 코스',p:'¥11,000'}];
  const courses = ltype==='online' ? oCourses : fCourses;
  const canGo = selDate!==null && selTime!==null && selCourse!==null;

  return (
    <div style={{paddingBottom:80}}>
      <div style={{background:'linear-gradient(135deg,#fff5f7,#ffe4e6)',padding:'14px 16px 24px'}}>
        <button onClick={()=>setScreen('detail')} style={{display:'flex',alignItems:'center',gap:4,background:'none',border:'none',fontSize:13,color:'#374151',cursor:'pointer',fontWeight:600,marginBottom:8}}>
          ← {t.bookingBack}
        </button>
        <h2 style={{fontSize:19,fontWeight:800,color:'#1f2937'}}>
          {lang==='ja'?`${tutor.nameJp}先生の予約`:`${tutor.nameKr} 선생님 예약`}
        </h2>
      </div>

      <div style={{padding:'14px 16px',display:'flex',flexDirection:'column',gap:12}}>
        {/* Step 1: Lesson Type */}
        <div className="card" style={{padding:16}}>
          <div className="section-title">① {t.selectLesson}</div>
          <div style={{display:'flex',gap:8}}>
            <button className={`toggle-btn ${ltype==='online'?'toggle-active':'toggle-inactive'}`} onClick={()=>{setLtype('online');setSelCourse(null);}}>
              💻 {t.onlineStr}
            </button>
            <button className={`toggle-btn ${ltype==='offline'?'toggle-active':'toggle-inactive'}`} onClick={()=>{setLtype('offline');setSelCourse(null);}}>
              🏠 {t.offlineStr}
            </button>
          </div>
        </div>

        {/* Step 2: Course */}
        <div className="card" style={{padding:16}}>
          <div className="section-title">② {t.selectCourse}</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {courses.map(c=>(
              <button key={c.k} onClick={()=>setSelCourse(c.k)} style={{
                display:'flex',alignItems:'center',justifyContent:'space-between',
                padding:'12px 16px',borderRadius:14,border:`2px solid ${selCourse===c.k?'#f43f5e':'#f3f4f6'}`,
                background: selCourse===c.k?'#fff1f2':'#fafafa',cursor:'pointer',transition:'all 0.2s',
              }}>
                <span style={{fontSize:13,fontWeight:500,color:'#374151'}}>{c.l}</span>
                <span style={{fontSize:14,fontWeight:700,color:selCourse===c.k?'#f43f5e':'#6b7280'}}>{c.p}</span>
              </button>
            ))}
          </div>
        </div>

        {/* Step 3: Date */}
        <div className="card" style={{padding:16}}>
          <div className="section-title">③ {t.selectDate}</div>
          <div className="date-scroll">
            {dates.map((d,i)=>(
              <button key={i} className={`date-btn ${selDate===i?'selected':''}`} onClick={()=>setSelDate(i)}>
                <span style={{fontSize:10,color:'#9ca3af'}}>{dayNames[d.getDay()]}</span>
                <span style={{fontSize:15,fontWeight:700,color:selDate===i?'#f43f5e':'#374151'}}>{d.getDate()}</span>
              </button>
            ))}
          </div>
        </div>

        {/* Step 4: Time */}
        <div className="card" style={{padding:16}}>
          <div className="section-title">④ {t.selectTime}</div>
          <div className="time-grid">
            {times.map(tm=>(
              <button key={tm} className={`time-btn ${selTime===tm?'selected':''}`} onClick={()=>setSelTime(tm)}>
                {tm}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div className="bottom-bar">
        <button className="btn-primary" disabled={!canGo} onClick={()=>canGo&&setScreen('confirm')}>
          {t.next}
        </button>
      </div>
    </div>
  );
}

  return (

      <div style={{background:'linear-gradient(135deg,#fff5f7,#ffe4e6)',padding:'14px 16px 24px'}}>
        <button onClick={()=>setScreen('booking')} style={{display:'flex',alignItems:'center',gap:4,background:'none',border:'none',fontSize:13,color:'#374151',cursor:'pointer',fontWeight:600,marginBottom:8}}>
          ← {t.bookingBack}
        </button>
        <h2 style={{fontSize:19,fontWeight:800,color:'#1f2937'}}>{t.confirmTitle}</h2>
      </div>

      <div style={{padding:'14px 16px',display:'flex',flexDirection:'column',gap:12}}>
        {/* Tutor */}
        <div className="card" style={{padding:16}}>
          <div style={{display:'flex',alignItems:'center',gap:14}}>
            <AvatarCircle tutor={tutor} size={56} />
            <div>
              <div style={{fontWeight:700,fontSize:16,color:'#1f2937'}}>{lang==='ja'?tutor.nameJp:tutor.nameKr}</div>
              <div style={{fontSize:12,color:'#9ca3af',marginTop:1}}>{tutor.age}{t.age} · {tutor.area}</div>
              <Stars r={tutor.rating} />
            </div>
          </div>
        </div>

        {/* Booking details */}
        <div className="card" style={{padding:16}}>
          {items.map((item,i)=>(
            <div key={i} style={{
              display:'flex',alignItems:'center',justifyContent:'space-between',
              padding:'10px 0',borderBottom: i<items.length-1?'1px solid #f9fafb':'none',
            }}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span>{item.icon}</span>
                <span style={{fontSize:13,color:'#6b7280'}}>{item.label}</span>
              </div>
              <span style={{fontSize:13,fontWeight:600,color:'#1f2937'}}>{item.val}</span>
            </div>
          ))}
        </div>

        {/* Checkpoints */}
        <div style={{background:'linear-gradient(135deg,#fff1f2,#ffe4e6)',borderRadius:20,padding:16,border:'1px solid #fecdd3'}}>
          {t.checks.map((c,i)=>(
            <div key={i} className="check-item">
              <span style={{color:'#22c55e',fontWeight:700,fontSize:18}}>✔</span>
              <span style={{fontSize:13,color:'#374151'}}>{c}</span>
            </div>
          ))}
        </div>

        {/* Payment */}
        <div className="card" style={{padding:16}}>
          <div className="section-title">{t.payMethod}</div>
          <div style={{display:'flex',alignItems:'center',gap:12,background:'#fafafa',borderRadius:14,padding:'12px 14px'}}>
            <span style={{fontSize:28}}>💳</span>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:'#374151'}}>Visa **** 4242</div>
              <div style={{fontSize:11,color:'#9ca3af'}}>{lang==='ja'?'登録済みカード':'등록된 카드'}</div>
            </div>
          </div>
        </div>
      </div>

      <div className="bottom-bar">
        <button className="btn-primary" onClick={()=>setScreen('complete')}>
          💕 {t.confirmBtn}
        </button>
      </div>
    </div>
  );
}

// ---- TUTOR REG SCREEN ----
function TutorRegScreen({ lang, t }) {
  const [onlineOn, setOnlineOn] = useState(false);
  const [offlineOn, setOfflineOn] = useState(false);
  const [selStyles, setSelStyles] = useState([]);
  const skeys = Object.keys(t.styles);
  const toggle = s => setSelStyles(p=>p.includes(s)?p.filter(x=>x!==s):[...p,s]);

  function Toggle({ on, setOn }) {
    return (
      <button onClick={()=>setOn(!on)} style={{
        width:48,height:26,borderRadius:13,background:on?'#f43f5e':'#d1d5db',
        border:'none',cursor:'pointer',position:'relative',transition:'background 0.2s',flexShrink:0,
      }}>
        <span style={{
          position:'absolute',top:3,width:20,height:20,background:'#fff',borderRadius:'50%',
          boxShadow:'0 1px 4px rgba(0,0,0,0.2)',transition:'left 0.2s',
          left: on?25:3,
        }} />
      </button>
    );
  }

  return (
    <div style={{padding:'20px 16px 32px'}}>
      <div style={{textAlign:'center',marginBottom:20}}>
        <div style={{fontSize:40,marginBottom:8}}>👨</div>
        <h2 style={{fontSize:20,fontWeight:800,color:'#1f2937'}}>{t.tutorRegTitle}</h2>
        <p style={{fontSize:12,color:'#9ca3af',marginTop:4}}>{t.tutorRegSub}</p>
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        {/* Basic */}
        <div className="card" style={{padding:16}}>
          <div className="section-title">{t.basicInfo}</div>
          {[
            {l:t.nameLabel,ph:lang==='ja'?'キム・ミンジュン':'김민준',tp:'text'},
            {l:t.ageLabel,ph:'25',tp:'number'},
            {l:t.areaLabel,ph:lang==='ja'?'東京都新宿区':'도쿄도 신주쿠구',tp:'text'},
          ].map((f,i)=>(
            <div key={i} style={{marginBottom:12}}>
              <label style={{fontSize:12,fontWeight:600,color:'#6b7280',display:'block',marginBottom:5}}>{f.l}</label>
              <input type={f.tp} placeholder={f.ph} className="inp" />
            </div>
          ))}
        </div>

        {/* Photo & Video */}
        <div className="card" style={{padding:16}}>
          <div className="section-title">{t.photoVideo}</div>
          {[
            {l:t.photoLabel,icon:'📸',h:t.photoHint},
            {l:t.videoLabel,icon:'🎬',h:t.videoHint},
          ].map((f,i)=>(
            <div key={i} style={{marginBottom: i===0?12:0}}>
              <label style={{fontSize:12,fontWeight:600,color:'#6b7280',display:'block',marginBottom:6}}>{f.l}</label>
              <div style={{border:'2px dashed #fda4af',borderRadius:16,padding:'20px',display:'flex',flexDirection:'column',alignItems:'center',gap:6,background:'#fff5f7',cursor:'pointer'}}>
                <span style={{fontSize:32}}>{f.icon}</span>
                <span style={{fontSize:12,color:'#9ca3af'}}>{f.h}</span>
              </div>
            </div>
          ))}
        </div>

        {/* Intro */}
        <div className="card" style={{padding:16}}>
          <div className="section-title">{t.introSection}</div>
          {[
            {l:t.introJp,ph:t.introJpPh},
            {l:t.introKr,ph:t.introKrPh},
          ].map((f,i)=>(
            <div key={i} style={{marginBottom: i===0?12:0}}>
              <label style={{fontSize:12,fontWeight:600,color:'#6b7280',display:'block',marginBottom:5}}>{f.l}</label>
              <textarea placeholder={f.ph} rows={3} className="inp" style={{resize:'none',lineHeight:1.6}} />
            </div>
          ))}
        </div>

        {/* Styles */}
        <div className="card" style={{padding:16}}>
          <div className="section-title">{t.styleTitle}</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {skeys.map(s=>(
              <button key={s} onClick={()=>toggle(s)} style={{
                padding:'8px 14px',borderRadius:20,border:`2px solid ${selStyles.includes(s)?'#f43f5e':'#e5e7eb'}`,
                background: selStyles.includes(s)?'#f43f5e':'#fafafa',
                color: selStyles.includes(s)?'#fff':'#6b7280',
                fontSize:12,fontWeight:600,cursor:'pointer',transition:'all 0.2s',
              }}>{t.styles[s]}</button>
            ))}
          </div>
        </div>

        {/* Online/Offline toggle */}
        <div className="card" style={{padding:16}}>
          <div className="section-title">{t.availLesson}</div>
          {[
            {icon:'💻',label:t.onlineAvail,on:onlineOn,set:setOnlineOn},
            {icon:'🏠',label:t.offlineAvail,on:offlineOn,set:setOfflineOn},
          ].map((item,i)=>(
            <div key={i} style={{
              display:'flex',alignItems:'center',justifyContent:'space-between',
              background:'#fafafa',borderRadius:14,padding:'12px 14px',
              marginBottom: i===0?8:0,
            }}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span>{item.icon}</span>
                <span style={{fontSize:13,fontWeight:500,color:'#374151'}}>{item.label}</span>
              </div>
              <button onClick={()=>item.set(!item.on)} style={{
                width:48,height:26,borderRadius:13,background:item.on?'#f43f5e':'#d1d5db',
                border:'none',cursor:'pointer',position:'relative',transition:'background 0.2s',
              }}>
                <span style={{
                  position:'absolute',top:3,width:20,height:20,background:'#fff',borderRadius:'50%',
                  boxShadow:'0 1px 4px rgba(0,0,0,0.2)',transition:'left 0.2s',
                  left: item.on?25:3,
                }} />
              </button>
            </div>
          ))}
        </div>

        {/* Price */}
        <div className="card" style={{padding:16}}>
          <div className="section-title">{t.priceTitle}</div>
          {[
            {l:t.onlinePrLabel,ph:'3500'},
            {l:t.offlinePrLabel,ph:'6000'},
          ].map((f,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:10,marginBottom: i===0?10:0}}>
              <label style={{fontSize:12,color:'#6b7280',minWidth:120,fontWeight:500}}>{f.l}</label>
              <div style={{flex:1,display:'flex',alignItems:'center',border:'2px solid #f3f4f6',borderRadius:14,padding:'10px 12px',background:'#fafafa'}}>
                <span style={{color:'#9ca3af',fontSize:13,marginRight:4}}>¥</span>
                <input type="number" placeholder={f.ph} style={{flex:1,border:'none',outline:'none',fontSize:13,background:'transparent',color:'#374151'}} />
              </div>
            </div>
          ))}
        </div>

        <button className="btn-primary">
          👨 {t.tutorRegBtn}
        </button>
      </div>
    </div>
  );
}

// ===================== APP =====================
function App() {
  const [lang, setLang] = useState('ja');
  const [screen, setScreen] = useState('home');
  const [tutor, setTutor] = useState(tutors[0]);
  const t = i18n[lang];

  const noNav = ['complete'];

  return (
    <div className="app-shell">
      {screen !== 'complete' && (
        <Header lang={lang} setLang={setLang} t={t} goHome={()=>setScreen('home')} />
      )}
      <div className="screen-scroll">
        {screen === 'home'     && <HomeScreen    lang={lang} t={t} setScreen={setScreen} setTutor={setTutor} />}
        {screen === 'detail'   && <DetailScreen  lang={lang} t={t} tutor={tutor} setScreen={setScreen} />}
        {screen === 'booking'  && <BookingScreen lang={lang} t={t} tutor={tutor} setScreen={setScreen} />}
        {screen === 'confirm'  && <ConfirmScreen lang={lang} t={t} tutor={tutor} setScreen={setScreen} />}
        {screen === 'complete' && <CompleteScreen lang={lang} t={t} tutor={tutor} setScreen={setScreen} />}
        {screen === 'signup'   && <SignupScreen  lang={lang} t={t} />}
        {screen === 'tutorReg' && <TutorRegScreen lang={lang} t={t} />}
      </div>
      {!noNav.includes(screen) && (
        <BottomNav t={t} screen={screen} setScreen={setScreen} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
